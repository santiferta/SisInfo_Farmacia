# ========================================
# APLICACION
# ========================================
spring.application.name=gestion-inventario
spring.application.version=1.0.0
spring.main.banner-mode=console

# ========================================
# BASE DE DATOS - PostgreSQL
# ========================================
spring.datasource.url=jdbc:postgresql://localhost:5432/postgres
spring.datasource.username=postgres
spring.datasource.password=Alvarofer5z896
spring.datasource.driver-class-name=org.postgresql.Driver

# ========================================
# JPA / HIBERNATE
# ========================================
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.batch_size=30
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true
spring.jpa.properties.hibernate.jdbc.fetch_size=100
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true
spring.jpa.open-in-view=false
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl

# ========================================
# LOGGING
# ========================================
logging.level.root=WARN
logging.level.com.farmacia.cristoredentor=INFO
logging.level.org.springframework.web=WARN
logging.level.org.springframework.security=WARN
logging.level.org.hibernate.SQL=WARN
logging.pattern.console=%d{HH:mm:ss} [%-5level] %msg%n
logging.level.org.springframework.boot.web.embedded.tomcat=INFO

# ========================================
# ACTUADOR / MONITORING
# ========================================
management.endpoints.web.exposure.include=health,info,metrics,prometheus,env,shutdown
management.metrics.export.simple.enabled=true
management.endpoint.health.show-details=ALWAYS
management.endpoint.health.show-components=ALWAYS
management.endpoint.shutdown.enabled=true

# ========================================
# CORS
# ========================================
spring.mvc.cors.allowed-origins=http://localhost:3000,http://localhost:8080
spring.mvc.cors.allowed-methods=GET,POST,PUT,DELETE,PATCH,OPTIONS
spring.mvc.cors.allowed-headers=*
spring.mvc.cors.allow-credentials=true
spring.mvc.cors.max-age=3600

# ========================================
# VALIDACION
# ========================================
spring.validation.enabled=true

# ========================================
# PDF
# ========================================
spring.pdf.settings.default.font-family=Helvetica